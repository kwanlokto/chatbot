services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma
    environment:
      - ALLOW_RESET=true

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot_backend
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LLM_PROVIDER=ollama
      - GEN_MODEL_NAME=llama3.2
    depends_on:
      - ollama
      - chromadb
    volumes:
      - ./app:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser-side JS calls this URL — must be reachable from the host machine
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  ollama-data:
  chroma-data:
